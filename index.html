<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ECOSURVEY</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#mainContent">Bỏ qua điều hướng</a>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Điều hướng chính">
        <div class="brand">
          <div class="brand-mark">ECO</div>
          <div>
            <strong>ECOSURVEY</strong>
            <span>Hệ thống Khảo sát Tổng Đài</span>
          </div>
        </div>

        <nav class="side-nav">
          <button class="nav-item active" data-view="dashboard" type="button">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M4 5.5A1.5 1.5 0 0 1 5.5 4h4A1.5 1.5 0 0 1 11 5.5v4A1.5 1.5 0 0 1 9.5 11h-4A1.5 1.5 0 0 1 4 9.5v-4ZM13 5.5A1.5 1.5 0 0 1 14.5 4h4A1.5 1.5 0 0 1 20 5.5v4a1.5 1.5 0 0 1-1.5 1.5h-4A1.5 1.5 0 0 1 13 9.5v-4ZM4 14.5A1.5 1.5 0 0 1 5.5 13h4a1.5 1.5 0 0 1 1.5 1.5v4A1.5 1.5 0 0 1 9.5 20h-4A1.5 1.5 0 0 1 4 18.5v-4ZM13 14.5a1.5 1.5 0 0 1 1.5-1.5h4a1.5 1.5 0 0 1 1.5 1.5v4a1.5 1.5 0 0 1-1.5 1.5h-4a1.5 1.5 0 0 1-1.5-1.5v-4Z" stroke="currentColor" stroke-width="1.8" />
              </svg>
            </span>
            <span>Tổng quan</span>
          </button>
          <button class="nav-item" data-view="surveys" type="button">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M8 4h8M8 20h8M6.5 7h11A1.5 1.5 0 0 1 19 8.5v7a1.5 1.5 0 0 1-1.5 1.5h-11A1.5 1.5 0 0 1 5 15.5v-7A1.5 1.5 0 0 1 6.5 7Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                <path d="M8.5 11h7M8.5 14h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
              </svg>
            </span>
            <span>Quản lý Khảo sát</span>
          </button>
          <button class="nav-item" data-view="branching" type="button">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M7 6v5a4 4 0 0 0 4 4h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                <path d="M7 18v-7a4 4 0 0 1 4-4h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                <path d="m15 4 3 3-3 3M15 12l3 3-3 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </span>
            <span>Điều kiện Rẽ nhánh</span>
          </button>
          <button class="nav-item" data-view="entry" type="button">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M7 4h10a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z" stroke="currentColor" stroke-width="1.8" />
                <path d="M8.5 9h7M8.5 13h7M8.5 17h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
              </svg>
            </span>
            <span>Nhập liệu Khảo sát</span>
          </button>
        </nav>

        <button class="logout-button" type="button">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M10 6H6.5A1.5 1.5 0 0 0 5 7.5v9A1.5 1.5 0 0 0 6.5 18H10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
              <path d="M13 8l4 4-4 4M17 12H9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </span>
          <span>Đăng xuất</span>
        </button>
      </aside>

      <main class="workspace" id="mainContent" tabindex="-1">
        <section id="content" class="content" aria-live="polite"></section>
      </main>
    </div>

    <div id="modalRoot"></div>
    <div id="toast" class="toast" role="status"></div>
    <script src="./app.js"></script>
  </body>
</html>
